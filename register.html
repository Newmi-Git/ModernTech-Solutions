<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="register-body">
        <div class="register-page">
            <div class="register-image">
                <div class="brand-animation">
                    <div class="orbit-ring ring-1"></div>
                    <div class="orbit-ring ring-2"></div>
                    <div class="orbit-ring ring-3"></div>
                    <div class="brand-core">
                        <div class="brand-icon">
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                        </div>
                    </div>
                    <div class="brand-text">
                    <p class="brand-name">ModernTech</p>
                    <p class="brand-sub">Solutions</p>
                    </div>
                    <div class="particle p1"></div>
                    <div class="particle p2"></div>
                    <div class="particle p3"></div>
                    <div class="particle p4"></div>
                </div>
            </div>
            <div class="register-details">
                <h1>ModernTech Solutions</h1>
                <label>Full Name:</label>
                <input type="text">
                <label>Email:</label>
                <input type="email"> 
                <label>Password:</label>
                <input type="password">
                <label>Re-Enter Password:</label>
                <input type="password">
                <input type="number" class="secret-code">
                <button class="login-button" type="button">Register</button>
            </div>
        </div>
        <script src="" async defer></script>
    </body>
</html>
