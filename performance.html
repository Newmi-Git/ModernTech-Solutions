<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Performance — ModernTech Solutions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="performance-body">

    <div class="container-lg py-4 d-flex flex-column gap-4">

      <!-- Navbar placeholder -->
      <div class="performance-header rounded px-3">Navbar</div>

      <!-- Title row -->
      <div class="d-flex justify-content-between align-items-center">
        <h1 class="fs-4 fw-bold mb-0" style="color: var(--dark)">Performance Overview</h1>
        <button type="button" class="btn btn-export">Export</button>
      </div>

      <!-- Stat cards -->
      <div class="row g-3">
        <div class="col-6 col-md-3">
          <div class="performance-card h-100 p-3">
            <p class="card-label">Average Performance</p>
            <p class="card-value" id="stat-avg">—<span>/ 100</span></p>
            <p class="card-change" id="stat-avg-sub"></p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="performance-card h-100 p-3">
            <p class="card-label">Top Performers</p>
            <p class="card-value" id="stat-top">—<span> employees</span></p>
            <p class="card-change" id="stat-top-sub"></p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="performance-card h-100 p-3">
            <p class="card-label">Needs Improvement</p>
            <p class="card-value" id="stat-improve">—<span> employees</span></p>
            <p class="card-change" id="stat-improve-sub"></p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="performance-card h-100 p-3">
            <p class="card-label">Reviews Completed</p>
            <p class="card-value" id="stat-reviews">—<span> employees</span></p>
            <p class="card-change" id="stat-reviews-sub"></p>
          </div>
        </div>
      </div>

      <!-- Score distribution + department averages -->
      <div class="row g-3">

        <div class="col-12 col-md-6">
          <div class="performance-stats p-4 h-100">
            <p class="stats-title">Score Distribution</p>
            <div id="score-distribution" class="d-flex flex-column gap-3"></div>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <div class="performance-stats p-4 h-100">
            <p class="stats-title">Avg Score by Department</p>
            <div id="dept-averages" class="d-flex flex-column gap-3"></div>
          </div>
        </div>

      </div>

      <!-- Employee table -->
      <div class="performance-employees p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <p class="stats-title mb-0">Employee Reviews</p>
          <input type="text" id="empSearch" placeholder="Search employee..." class="emp-search" />
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle" style="font-size: 12px;">
            <thead class="table-dark-custom">
              <tr>
                <th>Employee</th>
                <th>Department</th>
                <th>Score</th>
                <th>Goals Met</th>
                <th>Attendance</th>
                <th>Status</th>
                <th>Reviewed By</th>
              </tr>
            </thead>
            <tbody id="empTable"></tbody>
          </table>
        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="performance.js"></script>
  </body>
</html>
